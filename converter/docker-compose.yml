services:
  converter:
    build: .
    image: nexus-converter:latest
    container_name: nexus-converter
    restart: unless-stopped
    # publish ТОЛЬКО на loopback хоста → снаружи доступен лишь через nginx (TLS)
    ports:
      - "127.0.0.1:8094:8094"
    environment:
      PORT: "8094"
      # Служебный токен (curl/мониторинг). Браузерный виджет авторизуется по Origin.
      CONVERTER_TOKEN: "${CONVERTER_TOKEN}"
      MAX_BYTES: "52428800"
      CONVERT_TIMEOUT_MS: "30000"
      CONCURRENCY: "2"
      # Публичная схема: любой кабинет amoCRM/Kommo (однометочный поддомен).
      # Переопределяется при необходимости сузить до конкретных кабинетов.
      ALLOWED_ORIGIN_PATTERN: "^https://[a-z0-9][a-z0-9-]{0,62}\\.(amocrm\\.(ru|com)|kommo\\.com)$"
      RATE_LIMIT_PER_MIN: "30"        # на кабинет (Origin)
      RATE_LIMIT_PER_MIN_IP: "60"     # на IP (ловит ротацию поддоменов)
      MAX_RATE_KEYS: "5000"           # кап map лимитера (анти-OOM)
      MAX_INFLIGHT: "16"              # одновременных запросов с телом (анти-RAM-DoS)
      PREVIEW_DIR: "/preview"
      PREVIEW_BASE_URL: "https://nexus-oko.naithon.one"
      PREVIEW_TTL_MS: "300000"        # 5 мин — окно экспозиции файла для Microsoft
      PREVIEW_MAX_BYTES: "15728640"
    # том для временных preview-файлов (их по публичному URL качает Microsoft Office viewer);
    # nginx отдаёт их через location /preview/ → /opt/nexus-preview
    volumes:
      - /opt/nexus-preview:/preview
    # скромный сервер 2 CPU / 3.8 GB — лимиты, чтобы LibreOffice не съел всё
    mem_limit: 2g
    pids_limit: 256
    cpus: 2.0
    tmpfs:
      - /tmp:size=1g
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8094/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
