# nginx vhost для конвертера Nexus Looker.
# Деплой: /etc/nginx/sites-available/nexus-oko.conf + симлинк в sites-enabled/.
# После выпуска LE-сертификата certbot --nginx сам добавит listen 443 + redirect.
server {
    listen 80;
    server_name nexus-oko.naithon.one;
    client_max_body_size 60m;          # лимит файла конвертера 50МБ + запас
    location / {
        proxy_pass http://127.0.0.1:8094;   # контейнер amo-preview-converter
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;              # конвертация LibreOffice до 30с + запас
    }
}
