# nginx vhost для Nexus Looker (конвертер + статика виджета + Office-preview хостинг).
# Деплой: /etc/nginx/sites-available/nexus-oko.conf + симлинк в sites-enabled/.
# TLS-строки (listen 443 / ssl_*) добавляет/обновляет certbot --nginx.

# Rate-limit на загрузку файлов в /preview-host: токен есть у каждого клиента виджета,
# поэтому ограничиваем частоту аплоадов с одного IP (anti-DoS на диск/IO/RAM).
limit_req_zone $binary_remote_addr zone=preview_upload:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=convert_upload:10m rate=40r/m;  # /convert: второй эшелон per-IP
limit_req_status 429;   # клиент различает 429 (errors.rate_limited) и 5xx (недоступен)

server {
    server_name nexus-oko.naithon.one;
    client_max_body_size 60m;            # лимит файла конвертера 50МБ + запас

    # Статика виджета (script.js/style.css/vendor/boot.js) — для букмарклет-теста.
    location /widget/ {
        alias /opt/nexus-widget/;
        add_header Access-Control-Allow-Origin "*";
        autoindex off;
        expires -1;
    }

    # Временные preview-файлы: их по публичному URL качает Microsoft Office viewer.
    # autoindex off — листинг каталога запрещён (нельзя перебрать чужие uuid-файлы).
    # no-store/noindex/nosniff — файлы короткоживущие (TTL 5 мин), не должны
    # кэшироваться и индексироваться (риск репутации домена, spec §8).
    location /preview/ {
        alias /opt/nexus-preview/;
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-store";
        add_header X-Robots-Tag "noindex, nofollow";
        add_header X-Content-Type-Options "nosniff";
        autoindex off;
        default_type application/octet-stream;
        types { application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx; }
    }

    # Политика конфиденциальности и страница поддержки (нужны маркетплейсу).
    location /legal/ {
        alias /opt/nexus-legal/;
        autoindex off;
        default_type text/html;
    }

    # Загрузка файла для preview — с rate-limit (burst сглаживает легитимные всплески).
    location = /preview-host {
        limit_req zone=preview_upload burst=10 nodelay;
        proxy_pass http://127.0.0.1:8094;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Конвертер legacy → PDF (per-IP rate-limit — второй эшелон к app-лимитам).
    location = /convert {
        limit_req zone=convert_upload burst=20 nodelay;
        proxy_pass http://127.0.0.1:8094;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;   # app-лимитер ключуется по этому IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;              # конвертация LibreOffice до 30с + запас
    }

    # Всё остальное (/health и пр.).
    location / {
        proxy_pass http://127.0.0.1:8094;   # контейнер nexus-converter
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/nexus-oko.naithon.one/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/nexus-oko.naithon.one/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = nexus-oko.naithon.one) {
        return 301 https://$host$request_uri;
    } # managed by Certbot
    listen 80;
    server_name nexus-oko.naithon.one;
    return 404; # managed by Certbot
}
